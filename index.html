        <div id="results"></div>

<script>
    let actions = [];
    let criteres = [];
    let matrice = [];
    let poids = [];
    let types = [];
    let fonctionsPref = [];
    let seuils = [];

    function calculerPreference(d, type, q, p, s) {
        if (type === 'usuelle') {
            return d > 0 ? 1 : 0;
        } else if (type === 'u-shape') {
            return d > q ? 1 : 0;
        } else if (type === 'v-shape') {
            if (d <= 0) return 0;
            if (d > p) return 1;
            return d / p;
        } else if (type === 'level') {
            if (d <= q) return 0;
            if (d > p) return 1;
            return 0.5;
        } else if (type === 'linear') {
            if (d <= q) return 0;
            if (d > p) return 1;
            return (d - q) / (p - q);
        } else if (type === 'gaussian') {
            if (d <= 0) return 0;
            let sigma = s || (p / 3);
            return 1 - Math.exp(-(d * d) / (2 * sigma * sigma));
        }
        return 0;
    }

    function prometheeII(matrice, poids, types, fonctionsPref, seuilsParams) {
        let n = matrice.length;
        let m = matrice[0].length;
        let phiPlus = new Array(n).fill(0);
        let phiMoins = new Array(n).fill(0);

        for (let i = 0; i < n; i++) {
            for (let k = 0; k < n; k++) {
                if (i === k) continue;
                let sommePref = 0;
                for (let j = 0; j < m; j++) {
                    let diff = matrice[i][j] - matrice[k][j];
                    if (types[j] === 'min') diff = -diff;
                    let f = fonctionsPref[j];
                    let params = seuilsParams[j];
                    let pref = calculerPreference(diff, f, params.q, params.p, params.s);
                    sommePref += poids[j] * pref;
                }
                phiPlus[i] += sommePref;
                phiMoins[k] += sommePref;
            }
        }

        for (let i = 0; i < n; i++) {
            phiPlus[i] = phiPlus[i] / (n - 1);
            phiMoins[i] = phiMoins[i] / (n - 1);
        }

        let phiNet = [];
        for (let i = 0; i < n; i++) {
            phiNet.push(phiPlus[i] - phiMoins[i]);
        }
        return { phiPlus, phiMoins, phiNet };
    }

    function toggleSeuils(j) {
        let fct = document.getElementById(`fonction_${j}`).value;
        let divSeuils = document.getElementById(`seuils_${j}`);
        if(!divSeuils) return;
        
        if(fct === 'usuelle') {
            divSeuils.style.display = 'none';
            divSeuils.innerHTML = '';
        } else if(fct === 'u-shape') {
            divSeuils.innerHTML = `<input type="number" placeholder="q (indiff.)" id="q_${j}" value="0" step="any" class="border rounded w-28 px-2 py-1 text-sm" style="border-color:#9CD5FF;">`;
            divSeuils.style.display = 'inline-flex';
        } else if(fct === 'v-shape') {
            divSeuils.innerHTML = `<input type="number" placeholder="p (préf.)" id="p_${j}" value="1" step="any" class="border rounded w-28 px-2 py-1 text-sm" style="border-color:#9CD5FF;">`;
            divSeuils.style.display = 'inline-flex';
        } else if(fct === 'gaussian') {
            divSeuils.innerHTML = `<input type="number" placeholder="sigma (σ)" id="s_${j}" value="1" step="any" class="border rounded w-28 px-2 py-1 text-sm" style="border-color:#9CD5FF;">`;
            divSeuils.style.display = 'inline-flex';
        } else {
            divSeuils.innerHTML = `<input type="number" placeholder="q" id="q_${j}" value="0" step="any" class="border rounded w-24 px-2 py-1 text-sm" style="border-color:#9CD5FF;">
                                   <input type="number" placeholder="p" id="p_${j}" value="1" step="any" class="border rounded w-24 px-2 py-1 text-sm" style="border-color:#9CD5FF;">`;
            divSeuils.style.display = 'inline-flex';
        }
    }

    // importation te3 csv
    function importFromCSV(csvText) {
        const lines = csvText.trim().split(/\r?\n/);
        if (lines.length < 2) {
            alert("Format CSV invalide. Au moins 2 lignes requises.");
            return;
        }
        
        function parseCSVLine(line) {
            const result = [];
            let inQuotes = false;
            let current = '';
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }
        
        
        const isFullFormat = lines[0].toLowerCase().startsWith('#promethee');
        
        if (isFullFormat) {
            
            let section = '';
            let metadata = {
                actions: [],
                criteres: [],
                performances: [],
                poids: [],
                types: [],
                fonctions: [],
                seuils_q: [],
                seuils_p: [],
                seuils_s: []
            };
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('[') && line.endsWith(']')) {
                    section = line.slice(1, -1);
                    continue;
                }
                if (!line) continue;
                
                const row = parseCSVLine(line);
                
                if (section === 'CRITERES') {
                    metadata.criteres = row;
                } else if (section === 'ACTIONS') {
                    metadata.actions = row;
                } else if (section === 'PERFORMANCES') {
                    metadata.performances.push(row.map(v => parseFloat(v)));
                } else if (section === 'POIDS') {
                    metadata.poids = row.map(v => parseFloat(v));
                } else if (section === 'TYPES') {
                    metadata.types = row;
                } else if (section === 'FONCTIONS') {
                    metadata.fonctions = row;
                } else if (section === 'SEUILS_Q') {
                    metadata.seuils_q = row.map(v => parseFloat(v));
                } else if (section === 'SEUILS_P') {
                    metadata.seuils_p = row.map(v => parseFloat(v));
                } else if (section === 'SEUILS_S') {
                    metadata.seuils_s = row.map(v => parseFloat(v));
                }
            }
            
            const nbA = metadata.actions.length;
            const nbC = metadata.criteres.length;
            
            if (nbA < 2 || nbC < 2) {
                alert("Au moins 2 actions et 2 critères requis.");
                return;
            }
            
            document.getElementById('nbActions').value = nbA;
            document.getElementById('nbCriteres').value = nbC;
            
            genererInterfaceAvecPredef(false);
            
            setTimeout(() => {
                // Fill actions
                for(let i = 0; i < nbA; i++) {
                    let inp = document.getElementById(`actionName_${i}`);
                    if(inp) inp.value = metadata.actions[i];
                    actions[i] = metadata.actions[i];
                }
                
                
                for(let j = 0; j < nbC; j++) {
                    let inp = document.getElementById(`critereName_${j}`);
                    if(inp) inp.value = metadata.criteres[j];
                    criteres[j] = metadata.criteres[j];
                }
                
                
                for(let i = 0; i < nbA; i++) {
                    for(let j = 0; j < nbC; j++) {
                        let inp = document.getElementById(`perf_${i}_${j}`);
                        if(inp && metadata.performances[i] && metadata.performances[i][j] !== undefined) {
                            inp.value = metadata.performances[i][j];
                            matrice[i][j] = metadata.performances[i][j];
                        }
                    }
                }
                
                
                if (metadata.poids.length === nbC) {
                    let sum = metadata.poids.reduce((a,b) => a + b, 0);
                    if (Math.abs(sum - 1) > 0.01) {
                        alert(`Attention: Somme des poids = ${sum.toFixed(3)}. Normalisation à 1.`);
                        for(let j = 0; j < nbC; j++) {
                            metadata.poids[j] = metadata.poids[j] / sum;
                        }
                    }
                    for(let j = 0; j < nbC; j++) {
                        let inp = document.getElementById(`poids_${j}`);
                        if(inp) inp.value = metadata.poids[j].toFixed(4);
                        poids[j] = metadata.poids[j];
                    }
                }
                
                // Fill types
                if (metadata.types.length === nbC) {
                    for(let j = 0; j < nbC; j++) {
                        let sel = document.getElementById(`type_${j}`);
                        if(sel && (metadata.types[j] === 'max' || metadata.types[j] === 'min')) {
                            sel.value = metadata.types[j];
                            types[j] = metadata.types[j];
                        }
                    }
                }
                
                // Fill functions and thresholds
                if (metadata.fonctions.length === nbC) {
                    for(let j = 0; j < nbC; j++) {
                        let sel = document.getElementById(`fonction_${j}`);
                        if(sel) {
                            sel.value = metadata.fonctions[j];
                            fonctionsPref[j] = metadata.fonctions[j];
                            toggleSeuils(j);
                            
                            setTimeout(() => {
                                const func = metadata.fonctions[j];
                                if (func === 'u-shape' && metadata.seuils_q[j] !== undefined) {
                                    let qInp = document.getElementById(`q_${j}`);
                                    if(qInp) qInp.value = metadata.seuils_q[j];
                                } else if (func === 'v-shape' && metadata.seuils_p[j] !== undefined) {
                                    let pInp = document.getElementById(`p_${j}`);
                                    if(pInp) pInp.value = metadata.seuils_p[j];
                                } else if (func === 'gaussian' && metadata.seuils_s[j] !== undefined) {
                                    let sInp = document.getElementById(`s_${j}`);
                                    if(sInp) sInp.value = metadata.seuils_s[j];
                                } else if ((func === 'level' || func === 'linear') && metadata.seuils_q[j] !== undefined) {
                                    let qInp = document.getElementById(`q_${j}`);
                                    let pInp = document.getElementById(`p_${j}`);
                                    if(qInp) qInp.value = metadata.seuils_q[j];
                                    if(pInp && metadata.seuils_p[j] !== undefined) pInp.value = metadata.seuils_p[j];
                                }
                            }, 100);
                        }
                    }
                }
                
                const hint = document.getElementById('csvFormatHint');
                hint.style.display = 'block';
                hint.style.backgroundColor = '#d4edda';
                hint.style.padding = '8px';
                hint.style.borderRadius = '8px';
                hint.style.color = '#155724';
                hint.innerHTML = '✅ Fichier complet importé avec succès! Tous les paramètres sont chargés.';
                setTimeout(() => {
                    hint.style.display = 'none';
                }, 3000);
            }, 150);
            
        } else {
            // SIMPLE FORMAT
            const header = parseCSVLine(lines[0]);
            const nbC = header.length;
            const nbA = lines.length - 1;
            
            if (nbA < 2 || nbC < 2) {
                alert("Le fichier doit contenir au moins 2 actions et 2 critères.");
                return;
            }
            
            document.getElementById('nbActions').value = nbA;
            document.getElementById('nbCriteres').value = nbC;
            
            const newActions = [];
            const newMatrice = [];
            const newCriteres = header;
            
            for (let i = 1; i < lines.length; i++) {
                const row = parseCSVLine(lines[i]);
                if (row.length < 1) continue;
                
                const actionName = row[0] || `Action ${i}`;
                newActions.push(actionName);
                
                const perfRow = [];
                for (let j = 1; j <= nbC && j < row.length; j++) {
                    let val = parseFloat(row[j]);
                    perfRow.push(isNaN(val) ? 0 : val);
                }
                while (perfRow.length < nbC) perfRow.push(0);
                newMatrice.push(perfRow);
            }
            
            genererInterfaceAvecPredef(false);
            
            setTimeout(() => {
                for(let i = 0; i < nbA; i++) {
                    let inp = document.getElementById(`actionName_${i}`);
                    if(inp) inp.value = newActions[i];
                    actions[i] = newActions[i];
                }
                
                for(let j = 0; j < nbC; j++) {
                    let inp = document.getElementById(`critereName_${j}`);
                    if(inp) inp.value = newCriteres[j];
                    criteres[j] = newCriteres[j];
                }
                
                for(let i = 0; i < nbA; i++) {
                    for(let j = 0; j < nbC; j++) {
                        let inp = document.getElementById(`perf_${i}_${j}`);
                        if(inp) inp.value = newMatrice[i][j];
                        matrice[i][j] = newMatrice[i][j];
                    }
                }
                
                const equalWeight = (1 / nbC).toFixed(3);
                for(let j = 0; j < nbC; j++) {
                    let inp = document.getElementById(`poids_${j}`);
                    if(inp) inp.value = equalWeight;
                    poids[j] = parseFloat(equalWeight);
                }
                
                const hint = document.getElementById('csvFormatHint');
                hint.style.display = 'block';
                hint.style.backgroundColor = '#d4edda';
                hint.style.padding = '8px';
                hint.style.borderRadius = '8px';
                hint.style.color = '#155724';
                hint.innerHTML = '✅ Fichier CSV simple importé! Poids égaux par défaut. Ajustez les paramètres si besoin.';
                setTimeout(() => {
                    hint.style.display = 'none';
                }, 3000);
            }, 150);
        }
    }
    
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            importFromCSV(content);
        };
        reader.onerror = function() {
            alert("Erreur lors de la lecture du fichier.");
        };
        reader.readAsText(file, "UTF-8");
        event.target.value = '';
    }

     
    function genererInterfaceAvecPredef(keepConfig = true) {
        let nbA = parseInt(document.getElementById('nbActions').value);
        let nbC = parseInt(document.getElementById('nbCriteres').value);
        
        actions = Array.from({length: nbA}, (_, i) => `Action ${String.fromCharCode(65+i)}`);
        criteres = Array.from({length: nbC}, (_, i) => `Critère ${i+1}`);
        matrice = Array(nbA).fill().map(() => Array(nbC).fill(0));
        poids = Array(nbC).fill(1/nbC);
        types = Array(nbC).fill('max');
        fonctionsPref = Array(nbC).fill('usuelle');
        seuils = Array(nbC).fill().map(() => ({ q: 0, p: 1, s: 1 }));

        let html = `
            <div class="rounded-xl border p-5 mb-6 shadow-sm overflow-x-auto custom-scroll" style="background-color: #e0efff;">
                <div class="text-xl font-bold pl-3 mb-4 flex items-center gap-2" style="color: #36064D; border-left-width: 4px; border-left-color: #DA4848;">
                    <span>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 0 1-1.125-1.125M3.375 19.5h7.5c.621 0 1.125-.504 1.125-1.125m-9.75 0V5.625m0 12.75v-1.5c0-.621.504-1.125 1.125-1.125m18.375 2.625V5.625m0 12.75c0 .621-.504 1.125-1.125 1.125m1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125m0 3.75h-7.5A1.125 1.125 0 0 1 12 18.375m9.75-12.75c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125m19.5 0v1.5c0 .621-.504 1.125-1.125 1.125M2.25 5.625v1.5c0 .621.504 1.125 1.125 1.125m0 0h17.25m-17.25 0h7.5c.621 0 1.125.504 1.125 1.125M3.375 8.25c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125m17.25-3.75h-7.5c-.621 0-1.125.504-1.125 1.125m8.625-1.125c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125m-17.25 0h7.5m-7.5 0c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125M12 10.875v-1.5m0 1.5c0 .621-.504 1.125-1.125 1.125M12 10.875c0 .621.504 1.125 1.125 1.125m-2.25 0c.621 0 1.125.504 1.125 1.125M13.125 12h7.5m-7.5 0c-.621 0-1.125.504-1.125 1.125M20.625 12c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125m-17.25 0h7.5M12 14.625v-1.5m0 1.5c0 .621-.504 1.125-1.125 1.125M12 14.625c0 .621.504 1.125 1.125 1.125m-2.25 0c.621 0 1.125.504 1.125 1.125m0 1.5v-1.5m0 0c0-.621.504-1.125 1.125-1.125m0 0h7.5" />
                    </svg>
                    </span> 2. Matrice des performances
                </div>
                <table class="w-full border-collapse min-w-[500px]">
                    <thead>
                        <tr>
                            <th class="border p-2" style="background-color: #36064D; color: white; border-color: #7AAACE;">Actions \\ Critères</th>`;
        for (let j = 0; j < nbC; j++) {
            html += `<th class="border p-2" style="background-color: #36064D; color: white;">
                        <input type="text" id="critereName_${j}" value="Critère ${j+1}" class="w-full bg-transparent text-white text-center font-bold border-none focus:outline-none focus:ring-1 focus:ring-brand-light rounded">
                     </th>`;
        }
        html += `</tr>
                </thead>
                <tbody>`;
        for (let i = 0; i < nbA; i++) {
            html += `<tr>
                        <td class="border p-2 font-semibold" style="background-color: #DA4848;">
                            <input type="text" id="actionName_${i}" value="Action ${String.fromCharCode(65+i)}" class="w-full bg-transparent font-semibold border-none focus:outline-none focus:ring-1 focus:ring-brand-mid rounded" style="color:white;">
                           </td>`;
            for (let j = 0; j < nbC; j++) {
                html += `<td class="border p-2" style="border-color: #9CD5FF;"><input type="number" step="any" id="perf_${i}_${j}" value="0" class="w-full border rounded px-2 py-1" style="border-color:#9CD5FF;">
                            </td>`;
            }
            html += `</tr>`;
        }
        html += `</tbody>
                  </table>
            </div>`;

        html += `<div class="rounded-xl border p-5 mb-6 shadow-sm" style="background-color: #e0efff;">
                    <div class="text-xl font-bold pl-3 mb-4 flex items-center gap-2" style="color: #36064D; border-left-width: 4px; border-left-color: #DA4848;">
                        <span>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                        </span> 3. Paramètres subjectifs
                    </div>`;
        for (let j = 0; j < nbC; j++) {
            html += `<div class="border rounded-lg p-4 mb-4" style="background-color: oklch(96.7% 0.003 264.542);">
                        <strong style="color: #DA4848;">Critère ${j+1}</strong><br>
                        <div class="flex flex-wrap gap-3 mt-2 items-center">
                            <label class="text-sm font-medium" style="color:#355872;">Poids (somme=1) : </label>
                            <input type="number" step="0.01" id="poids_${j}" value="${(1/nbC).toFixed(2)}" class="border rounded w-24 px-2 py-1" style="border-color:#9CD5FF;">
                            <label class="text-sm font-medium" style="color:#355872;">Type : </label>
                            <select id="type_${j}" class="border rounded px-2 py-1" style="border-color:#9CD5FF;">
                                <option value="max">Maximiser</option>
                                <option value="min">Minimiser</option>
                            </select>
                            <label class="text-sm font-medium" style="color:#355872;">Fonction préférence : </label>
                            <select id="fonction_${j}" class="border rounded px-2 py-1" style="border-color:#9CD5FF;" onchange="toggleSeuils(${j})">
                                <option value="usuelle">Usuelle</option>
                                <option value="u-shape">U-shape (seuil q)</option>
                                <option value="v-shape">V-shape (seuil p)</option>
                                <option value="level">Level (q, p)</option>
                                <option value="linear">Linear (q, p)</option>
                                <option value="gaussian">Gaussian (sigma)</option>
                            </select>
                            <span id="seuils_${j}" class="inline-flex gap-2">
                            </span>
                        </div>
                      </div>`;
        }
        
        html += `</div><div class="text-center my-6"><button id="calculerBtn" class="text-white font-bold py-3 px-8 rounded-lg shadow transition-all duration-200 inline-flex items-center justify-center gap-2" style="background-color: #36064D;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="m9 12.75 3 3m0 0 3-3m-3 3v-7.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
            Lancer PROMETHEE II</button></div>`;
        
        document.getElementById('dynamicZone').innerHTML = html;
        document.getElementById('resultZone').style.display = 'none';

        for (let j = 0; j < nbC; j++) {
            let funcSelect = document.getElementById(`fonction_${j}`);
            if(funcSelect) {
                toggleSeuils(j);
            }
        }

        for (let i = 0; i < nbA; i++) {
            let inpName = document.getElementById(`actionName_${i}`);
            if(inpName) inpName.addEventListener('change', (function(idx){ return function(){
                actions[idx] = this.value;
            }})(i));
        }
        for (let j = 0; j < nbC; j++) {
            let inpCrit = document.getElementById(`critereName_${j}`);
            if(inpCrit) inpCrit.addEventListener('change', (function(idx){ return function(){
                criteres[idx] = this.value;
            }})(j));
        }

        document.getElementById('calculerBtn').addEventListener('click', lancerCalcul);
    }

    function lancerCalcul() {
        let nbA = parseInt(document.getElementById('nbActions').value);
        let nbC = parseInt(document.getElementById('nbCriteres').value);
        
        for(let i=0; i<nbA; i++) {
            let inp = document.getElementById(`actionName_${i}`);
            if(inp) actions[i] = inp.value;
        }
        for(let j=0; j<nbC; j++) {
            let inp = document.getElementById(`critereName_${j}`);
            if(inp) criteres[j] = inp.value;
        }

        for(let i=0; i<nbA; i++) {
            for(let j=0; j<nbC; j++) {
                let val = parseFloat(document.getElementById(`perf_${i}_${j}`).value);
                matrice[i][j] = isNaN(val) ? 0 : val;
            }
        }

        let sommePoids = 0;
        for(let j=0; j<nbC; j++) {
            let p = parseFloat(document.getElementById(`poids_${j}`).value);
            poids[j] = isNaN(p) ? 0 : p;
            sommePoids += poids[j];
            types[j] = document.getElementById(`type_${j}`).value;
            fonctionsPref[j] = document.getElementById(`fonction_${j}`).value;
            
            let q=0, pVal=1, s=1;
            if(fonctionsPref[j] === 'v-shape') {
                let pInput = document.getElementById(`p_${j}`);
                pVal = pInput ? (parseFloat(pInput.value) || 1) : 1;
            } else if(fonctionsPref[j] === 'gaussian') {
                let sInput = document.getElementById(`s_${j}`);
                s = sInput ? (parseFloat(sInput.value) || 1) : 1;
            } else if(fonctionsPref[j] === 'u-shape') {
                let qInput = document.getElementById(`q_${j}`);
                q = qInput ? (parseFloat(qInput.value) || 0) : 0;
            } else if(fonctionsPref[j] !== 'usuelle') {
                let qInput = document.getElementById(`q_${j}`);
                let pInput = document.getElementById(`p_${j}`);
                q = qInput ? (parseFloat(qInput.value) || 0) : 0;
                pVal = pInput ? (parseFloat(pInput.value) || 1) : 1;
            }
            seuils[j] = { q, p: pVal, s };
        }

        if(Math.abs(sommePoids - 1) > 0.01) {
            alert(`La somme des poids est ${sommePoids.toFixed(2)}. Veuillez mettre une somme = 1.`);
            return;
        }

        let resultats = prometheeII(matrice, poids, types, fonctionsPref, seuils);
        let { phiPlus, phiMoins, phiNet } = resultats;

        let indices = [...Array(nbA).keys()];
        indices.sort((a,b) => phiNet[b] - phiNet[a]);

        let htmlRes = `<div class="overflow-x-auto custom-scroll"><table class="w-full border-collapse mb-6 shadow-sm">
                         <thead><tr style="background-color: #355872; color: white;"><th class="border p-2" style="border-color:#7AAACE;">Action</th><th class="border p-2" style="border-color:#7AAACE;">Φ⁺ (flux sortant)</th><th class="border p-2" style="border-color:#7AAACE;">Φ⁻ (flux entrant)</th><th class="border p-2" style="border-color:#7AAACE;">Φ net</th></tr></thead>
                         <tbody>`;
        for(let i=0; i<nbA; i++) {
            let bgClass = i % 2 === 0 ? 'bg-white' : 'bg-gray-50';
            htmlRes += `<tr class="${bgClass}">
                             <td class="border p-2 font-semibold" style="border-color:#9CD5FF; color:#355872;">${actions[i]}</td>
                             <td class="border p-2" style="border-color:#9CD5FF;">${phiPlus[i].toFixed(4)}</td>
                             <td class="border p-2" style="border-color:#9CD5FF;">${phiMoins[i].toFixed(4)}</td>
                             <td class="border p-2 font-bold" style="border-color:#9CD5FF; color:#355872;">${phiNet[i].toFixed(4)}</td>
                            </tr>`;
        }
        htmlRes += `</tbody>
                    </table>
                    </div>
                    <div class="text-xl font-bold pl-3 mb-4 flex items-center gap-2" style="color: #36064D; border-left-width: 4px; border-left-color: #DA4848;">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5M9 11.25v1.5M12 9v3.75m3-6v6" />
                    </svg>

                    Classement final
                    </div>`;
                
        for(let r=0; r<indices.length; r++) {
            htmlRes += `<span class="text-white rounded-full px-4 py-2 shadow-md" style="background-color: #7AAACE;">${r+1}. ${actions[indices[r]]} (Φ = ${phiNet[indices[r]].toFixed(4)})</span> `;
        }
        htmlRes += `</div><p class="mt-4 text-sm" style="color:#355872;">✅ La meilleure action est <strong style="color: #355872;">${actions[indices[0]]}</strong> (Φ net le plus élevé).</p></div>`;
        
        document.getElementById('results').innerHTML = htmlRes;
        document.getElementById('resultZone').style.display = 'block';
        window.scrollTo({ top: document.getElementById('resultZone').offsetTop, behavior: 'smooth' });
    }

    // Initialize event listeners
    document.getElementById('configBtn').addEventListener('click', () => genererInterfaceAvecPredef(true));
    document.getElementById('resetBtn').addEventListener('click', () => genererInterfaceAvecPredef(true));
    document.getElementById('fileUpload').addEventListener('change', handleFileUpload);
    
    document.getElementById('importBtn').addEventListener('click', function() {
        document.getElementById('fileUpload').click();
    });
    
    genererInterfaceAvecPredef(true);
</script>
</body>
</html>
